name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript actions into the Node.js 24 runtime ahead of the
# 2026-06-02 forced cutover. See:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo / target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check (workspace, all targets)
        run: cargo check --workspace --all-targets

      - name: cargo test (workspace, soft)
        run: cargo test --workspace
        continue-on-error: true

  docs-check:
    name: docs-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: boundary smoke
        run: |
          chmod +x scripts/pccx-lab-boundary-smoke.sh
          chmod +x scripts/test-boundary-smoke-fixtures.sh
          ./scripts/pccx-lab-boundary-smoke.sh
          ./scripts/test-boundary-smoke-fixtures.sh

  frontend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run test:static
        run: npm run test:static

      - name: npm run typecheck
        run: npm run typecheck

      - name: npm run build
        run: npm run build
